<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moovo 營運決策監測系統</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary-color: #2c3e50; --secondary-color: #34495e; --accent-color: #27ae60; --bg-color: #f4f7f6; }
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; background-color: var(--bg-color); color: var(--primary-color); margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; background: white; padding: 20px 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .header h1 { margin: 0; font-size: 24px; color: var(--primary-color); }
        .roi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; }
        .card .label { font-size: 14px; color: #7f8c8d; margin-bottom: 10px; }
        .card .value { font-size: 28px; font-weight: bold; color: var(--accent-color); }
        .main-content { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 30px; }
        .controls { margin-bottom: 25px; text-align: center; }
        button { background-color: var(--secondary-color); color: white; border: none; padding: 10px 25px; margin: 0 10px; border-radius: 6px; cursor: pointer; transition: 0.3s; }
        button:hover { background-color: var(--primary-color); opacity: 0.9; }
        .chart-container { height: 450px; width: 100%; }
        .footer { text-align: center; font-size: 13px; color: #95a5a6; }
        .comparison-tag { font-size: 12px; padding: 2px 8px; border-radius: 20px; background: #e8f6ef; color: #27ae60; margin-left: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>📡 Moovo 數位轉型：營運數據中心</h1>
            <div id="last-update" style="color: #95a5a6; font-size: 14px;">數據即時同步中...</div>
        </header>

        <div class="roi-grid">
            <div class="card">
                <div class="label">人力工時節省 (每月)</div>
                <div class="value">30 小時 <span class="comparison-tag">100% 降幅</span></div>
            </div>
            <div class="card">
                <div class="label">數據採集頻率提升</div>
                <div class="value">1400% <span class="comparison-tag">每 4 小時/次</span></div>
            </div>
            <div class="card">
                <div class="label">預估每月節省成本</div>
                <div class="value">NT$ 7,500 <span class="comparison-tag">持續累積中</span></div>
            </div>
        </div>

        <div class="main-content">
            <div class="controls">
                <button onclick="updateChart('bar')">場站概覽 (長條圖)</button>
                <button onclick="updateChart('pie')">佔比分析 (圓餅圖)</button>
            </div>
            <div class="chart-container">
                <canvas id="mainChart"></canvas>
            </div>
        </div>

        <footer class="footer">
            本系統採自動化雲端監測架構，目前監測 <span id="station-count">--</span> 個站點數據 | 系統狀態：穩定運行
        </footer>
    </div>

    <script>
        let myChart = null;
        let chartData = { labels: [], values: [] };

        async function init() {
            try {
                const response = await fetch('./last_data.json?t=' + Date.now());
                const data = await response.json();
                
                chartData.labels = Object.keys(data);
                chartData.values = Object.values(data).map(item => item.bikes);
                
                document.getElementById('station-count').innerText = chartData.labels.length;
                document.getElementById('last-update').innerText = `最後同步時間：${new Date().toLocaleString()}`;
                
                updateChart('bar');
            } catch (err) {
                console.error("無法加載數據", err);
            }
        }

        function updateChart(type) {
            const ctx = document.getElementById('mainChart').getContext('2d');
            if (myChart) myChart.destroy();

            const colors = chartData.labels.map((_, i) => `hsl(${(i * 360) / chartData.labels.length}, 65%, 55%)`);

            myChart = new Chart(ctx, {
                type: type,
                data: {
                    labels: chartData.labels,
                    datasets: [{
                        label: '當前可用車輛 (台數)',
                        data: chartData.values,
                        backgroundColor: colors,
                        borderRadius: 5
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: type !== 'bar' } },
                    scales: type === 'bar' ? { y: { beginAtZero: true, grid: { display: false } } } : {}
                }
            });
        }
        init();
    </script>
</body>
</html>
