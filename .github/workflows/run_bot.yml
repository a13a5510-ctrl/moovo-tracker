name: Moovo Auto Tracker

on:
  schedule:
    # 🎯 修改這裡：從 '0 * * * *' 改為 '0 */4 * * *'
    - cron: '0 */4 * * *'  # 每 4 小時執行一次 (整點)
  workflow_dispatch:      # 依然保留手動按鈕，方便您隨時測試

jobs:
  run-bot:
    runs-on: windows-latest
    # ... 後面的步驟維持原樣 ...
    steps:
      - name: 1. Checkout
        uses: actions/checkout@v4

      - name: 2. Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 3. 安裝工具
        run: |
          pip install --upgrade requests playwright google-generativeai
          playwright install chromium

      - name: 4. 啟動機器人
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PYTHONUTF8: 1
          PYTHONIOENCODING: utf-8
        run: python myapp.py
